name: Publish NuGet Packages

on:
  push:
    tags:
      - 'outcome-v*'
      - 'cqrs-v*'
      - 'events-v*'
      - 'rabbitmq-v*'
      - 'postgresql-v*'
      - 'sqlserver-v*'

permissions:
  id-token: write
  contents: read

# Each job runs only when the tag matches its pattern, then delegates
# to the corresponding reusable workflow.

jobs:
  publish-outcome:
    if: startsWith(github.ref_name, 'outcome-v')
    uses: ./.github/workflows/publish-outcome-package.yml
    secrets: inherit

  publish-cqrs:
    if: startsWith(github.ref_name, 'cqrs-v')
    uses: ./.github/workflows/publish-cqrs-package.yml
    secrets: inherit

  publish-events:
    if: startsWith(github.ref_name, 'events-v')
    uses: ./.github/workflows/publish-events-package.yml
    secrets: inherit

  publish-rabbitmq:
    if: startsWith(github.ref_name, 'rabbitmq-v')
    uses: ./.github/workflows/publish-rabbitmq-package.yml
    secrets: inherit

  publish-postgresql:
    if: startsWith(github.ref_name, 'postgresql-v')
    uses: ./.github/workflows/publish-postgresql-package.yml
    secrets: inherit

  publish-sqlserver:
    if: startsWith(github.ref_name, 'sqlserver-v')
    uses: ./.github/workflows/publish-sqlserver-package.yml
    secrets: inherit

