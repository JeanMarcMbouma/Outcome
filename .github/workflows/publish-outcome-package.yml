name: Publish BbQ.Outcome to NuGet

on:
  push:
    tags:
      - 'outcome-v*'  # Triggers on tags like outcome-v1.0.0, outcome-v1.0.1
  workflow_call:       # Allow main.yml to call this workflow

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: |
          dotnet restore src/BbQ.Outcome/BbQ.Outcome.csproj
          dotnet restore src/BbQ.Outcome.SourceGenerators/BbQ.Outcome.SourceGenerators.csproj

      - name: Build
        run: |
          dotnet build src/BbQ.Outcome/BbQ.Outcome.csproj --configuration Release --no-restore
          dotnet build src/BbQ.Outcome.SourceGenerators/BbQ.Outcome.SourceGenerators.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/BbQ.Outcome.Tests/BbQ.Outcome.Tests.csproj --configuration Release --verbosity normal

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#outcome-v}" >> $GITHUB_OUTPUT

      - name: Pack BbQ.Outcome
        run: dotnet pack src/BbQ.Outcome/BbQ.Outcome.csproj --configuration Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack BbQ.Outcome.SourceGenerators
        run: dotnet pack src/BbQ.Outcome.SourceGenerators/BbQ.Outcome.SourceGenerators.csproj --configuration Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push Symbols
        run: dotnet nuget push ./artifacts/*.snupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
