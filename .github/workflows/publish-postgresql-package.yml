name: Publish BbQ.Events.PostgreSql to NuGet

on:
  push:
    tags:
      - 'postgresql-v*'  # Triggers on tags like postgresql-v0.1.0, postgresql-v1.0.0
  workflow_call:           # Allow main.yml to call this workflow

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore src/BbQ.Events.PostgreSql/BbQ.Events.PostgreSql.csproj

    - name: Build
      run: dotnet build src/BbQ.Events.PostgreSql/BbQ.Events.PostgreSql.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test tests/BbQ.Events.PostgreSql.Tests/BbQ.Events.PostgreSql.Tests.csproj --configuration Release --verbosity normal
      # Tests use Testcontainers which requires Docker

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#postgresql-v}" >> $GITHUB_OUTPUT

    - name: Pack
      run: dotnet pack src/BbQ.Events.PostgreSql/BbQ.Events.PostgreSql.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}
      
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
        
    - name: Push to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
